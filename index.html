<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google font -  Fira Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
    <title>Color Scheme Generator</title>
</head>
<body>

    <main>
        <section class="user-input-container">
            <input type="color" id="color-input" name="color-input" class="color-input">
            <select id="mode-select" class="mode-select" name="mode-select">
                <option value="monochrome">Monochrome</option>
                <option value="monochrome-dark">Monochrome-dark</option>
                <option value="monochrome-light">Monochrome-light</option>
                <option value="analogic">Analogic</option>
                <option value="complement">Complement</option>
                <option value="analogic-complement">Analogic-complement</option>
                <option value="triad">Triad</option>
                <option value="quad">Quad</option>
            </select>
            <button type="button" id="get-color-scheme-btn" class="get-color-scheme-btn" name="get-color-scheme-btn">Get color scheme</button>
        </section>

        <section class="color-display-container" id="color-display-container">
            <!-- Here the colors will appears each in a separate div -->
        </section>

    </main>
    
    <script src="index.js"></script>
</body>
</html>
